<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCrFXzXL1hoDYRrmXwILK4sSanJ28acOxA",
    authDomain: "cendis-noc26.firebaseapp.com",
    projectId: "cendis-noc26",
    storageBucket: "cendis-noc26.firebasestorage.app",
    messagingSenderId: "154600562289",
    appId: "1:154600562289:web:0fcbfa4f1adcb4e2f805d0"
  };

  const fbApp = initializeApp(firebaseConfig);
  const db_fb = getFirestore(fbApp);
  const storage_fb = getStorage(fbApp);

  window.fbUploadPhoto = async (path, blob) => {
    try {
      const r = ref(storage_fb, path);
      await uploadBytes(r, blob, { contentType: 'image/jpeg' });
      return await getDownloadURL(r);
    } catch(e) { console.warn('fbUploadPhoto error:', e); return null; }
  };

  window.fbSave = async (col, id, data) => {
    try {
      await setDoc(doc(db_fb, col, id), { payload: JSON.stringify(data) });
      return true;
    } catch(e) { console.warn('fbSave error:', e); return false; }
  };

  window.fbLoad = async (col, id) => {
    try {
      const snap = await getDoc(doc(db_fb, col, id));
      if (snap.exists()) return JSON.parse(snap.data().payload);
    } catch(e) { console.warn('fbLoad error:', e); }
    return null;
  };

  window.fbListen = (col, id, callback) =>
    onSnapshot(doc(db_fb, col, id), snap => {
      if (snap.exists()) {
        try { callback(JSON.parse(snap.data().payload)); } catch(e) {}
      }
    }, err => console.warn('fbListen error:', err));

  window.fbSetStatus = (online) => {
    const dot = document.getElementById('fb-dot');
    const txt = document.getElementById('fb-txt');
    if (dot) dot.style.background = online ? '#22c55e' : '#ef4444';
    if (txt) txt.textContent = online ? '☁ En línea' : '○ Sin conexión';
  };

  window.__fbReady = true;
  window.dispatchEvent(new Event('fb-ready'));
</script>

function waitForFirebase(timeoutMs){
  return new Promise(resolve => {
    if(window.__fbReady) return resolve(true);
    const onReady = () => { window.removeEventListener('fb-ready', onReady); resolve(true); };
    window.addEventListener('fb-ready', onReady);
    setTimeout(() => resolve(!!window.__fbReady), timeoutMs || 4000);
  });
}

function diasRestantes(v){
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const fv = new Date(v.fecha_vencimiento + 'T00:00:00');
  return Math.round((fv - hoy) / 86400000);
}
function claseVencimiento(v){
  const dias = diasRestantes(v);
  if(dias > 30) return { nivel:'VERDE', label:'Estable', color:'var(--success-text)', bg:'var(--success-bg)', border:'var(--success-border)' };
  if(dias >= 15) return { nivel:'AMARILLO', label:'Crítico', color:'var(--warning-text)', bg:'var(--warning-bg)', border:'#F0C674' };
  return { nivel:'ROJO', label:'Evacuación', color:'var(--danger-text)', bg:'var(--danger-bg)', border:'var(--danger-border)' };
}
async function persistVencimiento(v){
  const idx = vencimientos.findIndex(x => x.id===v.id);
  if(idx>=0) vencimientos[idx] = v; else vencimientos.unshift(v);
  if(!FB_OK) return false;
  try{ return await window.fbSave(COL_VENC, 'main', vencimientos); }

async function loadAll(){
  try{
    await waitForFirebase();
    FB_OK = typeof window.fbSave === 'function';
    if(typeof window.fbSetStatus === 'function') window.fbSetStatus(FB_OK);
    if(!FB_OK){ render(); return; }
    try{
      const cat = await window.fbLoad(COL_CATALOGOS, 'main');
      if(cat){
        const validoNuevoEsquema = cat.trabajadores && !Array.isArray(cat.trabajadores)
          && Array.isArray(cat.trabajadores.NOCTURNO) && Array.isArray(cat.trabajadores.DIURNO);
        catalogos = validoNuevoEsquema ? cat : JSON.parse(JSON.stringify(DEFAULT_CATALOGOS));
      }
    }catch(e){ /* no catalogos guardados aun, se usan los valores por defecto */ }
    try{
      const a = await window.fbLoad(COL_AUDITS, 'main');
      if(Array.isArray(a)) audits = a.slice().sort((x,y) => y.id.localeCompare(x.id));
    }catch(e){ console.error('Error cargando historial', e); }
    try{
      const v = await window.fbLoad(COL_VENC, 'main');
      if(Array.isArray(v)) vencimientos = v;
    }catch(e){ console.error('Error cargando vencimientos', e); }
    try{
      state.asignacionHoy = await getOrCreateAsignacionDiaria();
    }catch(e){ console.error('Error calculando asignacion diaria', e); state.asignacionHoy = null; }

    window.fbListen(COL_AUDITS, 'main', (data) => {
      if(Array.isArray(data)){ audits = data.slice().sort((x,y) => y.id.localeCompare(x.id)); render(); }
    });
    window.fbListen(COL_VENC, 'main', (data) => {
      if(Array.isArray(data)){ vencimientos = data; render(); }
    });

    render();
  }catch(e){
    console.error('Error inicializando la app', e);
    try{ render(); }catch(e2){
      document.getElementById('app').innerHTML = '<div style="padding:24px;font-family:sans-serif;color:#B3261E;">Ocurrió un error cargando la app. Revisa la consola para más detalle.</div>';
    }
  }
}

function auditDate(a){
  const ts = Number(a.id.replace('aud_',''));
  return isNaN(ts) ? new Date() : new Date(ts);
}

function isoWeekKey(date){
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = (d.getUTCDay() + 6) % 7;
  d.setUTCDate(d.getUTCDate() - dayNum + 3);
  const firstThursday = new Date(Date.UTC(d.getUTCFullYear(), 0, 4));
  const weekNum = 1 + Math.round(((d - firstThursday) / 86400000 - 3 + (firstThursday.getUTCDay()+6)%7) / 7);
  return d.getUTCFullYear() + '-W' + String(weekNum).padStart(2,'0');
}

function categoriaStats(){
  const cats = {
    'Procesamiento y cortes': [],
    'Seguridad industrial': [],
    'FEFO y rotación': [],
    'Orden y almacenaje': []
  };
  audits.forEach(a => {
    if(a.cortes_adecuados) cats['Procesamiento y cortes'].push(a.cortes_adecuados==='SI');
    if(a.equipos_seguridad_ok) cats['Seguridad industrial'].push(a.equipos_seguridad_ok==='SI');
    if(a.fefo) cats['FEFO y rotación'].push(a.fefo==='SI');
    if(a.bultos_identificados) cats['Orden y almacenaje'].push(a.bultos_identificados==='SI');
    if(a.cinco_s) cats['Orden y almacenaje'].push(a.cinco_s==='SI');
    if(pctVentanas(a)!==null) cats['Orden y almacenaje'].push(pctVentanas(a)>=90);
    if(a.bulticos_pendientes) cats['Orden y almacenaje'].push(a.bulticos_pendientes==='NO');
  });
  return Object.entries(cats).map(([nombre, arr]) => ({
    nombre,
    pct: arr.length ? Math.round((arr.filter(Boolean).length/arr.length)*100) : null,
    n: arr.length
  }));
}

function frecuenciaStats(){
  const semanaActual = isoWeekKey(new Date());
  const build = (turno) => catalogos.trabajadores[turno].map(t => {
    const count = audits.filter(a => a.trabajador===t && a.turno===turno && !a.excluida_cuota && isoWeekKey(auditDate(a))===semanaActual).length;
    return { trabajador: t, count, cumplido: count>=1 };
  });
  return { DIURNO: build('DIURNO'), NOCTURNO: build('NOCTURNO') };
}

function hashStr(str){
  let h = 0;
  for(let i=0;i<str.length;i++){ h = (h<<5) - h + str.charCodeAt(i); h |= 0; }
  return h >>> 0;
}
function mulberry32(seed){
  return function(){
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function seededShuffle(arr, seed){
  const rnd = mulberry32(seed);
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j = Math.floor(rnd()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function dateKeyOf(date){
  return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');
}
function todayKey(){
  return dateKeyOf(new Date());
}
function trabajadoresEvaluadosHoy(){
  const hoy = todayKey();
  return new Set(audits.filter(a => dateKeyOf(auditDate(a)) === hoy).map(a => a.trabajador));
}
async function getOrCreateAsignacionDiaria(){
  const key = todayKey();
  const generar = () => ({
    fecha:key,
    DIURNO: seededShuffle(catalogos.trabajadores.DIURNO, hashStr(key+'-DIURNO')).slice(0,2),
    NOCTURNO: seededShuffle(catalogos.trabajadores.NOCTURNO, hashStr(key+'-NOCTURNO')).slice(0,2)
  });
  if(!FB_OK){ return generar(); }
  try{
    const existing = await window.fbLoad(COL_ASIGNACION, key);
    if(existing && Array.isArray(existing.DIURNO) && Array.isArray(existing.NOCTURNO)) return existing;
  }catch(e){ /* aún no existe para hoy, se crea abajo */ }
  const asignacion = { ...generar(), generado_en: new Date().toISOString() };
  try{ await window.fbSave(COL_ASIGNACION, key, asignacion); }
  catch(e){ console.error('Error guardando asignacion diaria', e); }
  return asignacion;
}

function pctPaletas(a){
  const t = Number(a.paletas_total), c = Number(a.paletas_correctas);
  if(!t || t<=0 || a.paletas_correctas === '') return null;
  return Math.round((c/t)*100);
}

const TOTAL_VENTANAS = 41;
function pctVentanas(a){
  if(a.ventanas_incumplen === '' || a.ventanas_incumplen === null) return null;
  const incumplen = Number(a.ventanas_incumplen);
  if(isNaN(incumplen) || incumplen < 0 || incumplen > TOTAL_VENTANAS) return null;
  return Math.round(((TOTAL_VENTANAS - incumplen) / TOTAL_VENTANAS) * 1000) / 10;
}

function slotComplianceOf(a){
  const answered = a.ubicaciones.filter(u => u.slot);
  if(!answered.length) return null;
  const ok = answered.filter(u => u.slot === 'SI').length;
  return Math.round((ok/answered.length)*100);
}

function abrirCamara(opts){
  const modoBarcode = !!(opts && opts.modoBarcode);
  return new Promise(async (resolve) => {
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      alert('Este navegador no soporta acceso a la cámara.');
      resolve(null); return;
    }
    let stream;
    try{
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    }catch(e){
      alert('No se pudo acceder a la cámara. Revisa los permisos del navegador para este sitio.');
      resolve(null); return;
    }
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:#000;z-index:99999;display:flex;flex-direction:column;';
    const video = document.createElement('video');
    video.autoplay = true; video.playsInline = true; video.muted = true;
    video.style.cssText = 'flex:1;width:100%;object-fit:cover;';
    video.srcObject = stream;
    const hint = document.createElement('div');
    hint.style.cssText = 'color:#fff;text-align:center;font-family:sans-serif;font-size:12px;padding:8px;';
    hint.textContent = modoBarcode ? 'Apunte al código de barras' : 'Encuadre la evidencia y capture';
    const bar = document.createElement('div');
    bar.style.cssText = 'padding:14px;display:flex;gap:10px;background:#000;';
    const btnCap = document.createElement('button');
    btnCap.style.cssText = 'flex:1;padding:14px;border-radius:10px;border:none;background:#fff;font-weight:700;font-family:inherit;';
    const btnCancel = document.createElement('button');
    btnCancel.textContent = 'Cancelar';
    btnCancel.style.cssText = 'flex:1;padding:14px;border-radius:10px;border:1px solid #fff;background:transparent;color:#fff;font-weight:700;font-family:inherit;';
    bar.appendChild(btnCap); bar.appendChild(btnCancel);
    overlay.appendChild(hint); overlay.appendChild(video); overlay.appendChild(bar);
    document.body.appendChild(overlay);

    let activo = true;
    const cleanup = () => { activo = false; stream.getTracks().forEach(t=>t.stop()); overlay.remove(); };
    btnCancel.onclick = () => { cleanup(); resolve(null); };

    const capturarFrame = () => new Promise(res => {
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth || 640; canvas.height = video.videoHeight || 480;
      canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(b => res({ blob:b, dataUrl: canvas.toDataURL('image/jpeg',0.7) }), 'image/jpeg', 0.7);
    });

    if(modoBarcode && 'BarcodeDetector' in window){
      btnCap.textContent = 'Escribir código manualmente';
      let detector;
      try{ detector = new window.BarcodeDetector(); }catch(e){ detector = null; }
      btnCap.onclick = async () => { const frame = await capturarFrame(); cleanup(); resolve({ manual:true, ...frame }); };
      const loop = async () => {
        if(!activo) return;
        if(detector){
          try{
            const codes = await detector.detect(video);
            if(codes && codes.length){
              const frame = await capturarFrame();
              cleanup();
              resolve({ code: codes[0].rawValue, ...frame });
              return;
            }
          }catch(e){}
        }
        requestAnimationFrame(loop);
      };
      requestAnimationFrame(loop);
    } else {
      btnCap.textContent = modoBarcode ? 'Capturar y escribir código' : 'Capturar foto';
      btnCap.onclick = async () => {
        const frame = await capturarFrame();
        cleanup();
        resolve(modoBarcode ? { manual:true, ...frame } : frame);
      };
    }
  });
}

    main.appendChild(selTurno);
    selTurno.querySelector('select').onchange = e => { d.turno = e.target.value; d.trabajador=''; render(); };

    const selEval = el(`<div><label class="field-label">Evaluador</label><select id="sel-eval">
      <option value="">Seleccione...</option>
      ${catalogos.usuarios.map(u=>`<option ${d.evaluador===u?'selected':''}>${u}</option>`).join('')}
    </select></div>`);
    main.appendChild(selEval);
    selEval.querySelector('select').onchange = e => { d.evaluador = e.target.value; };

    const listaTrabTurno = d.turno ? catalogos.trabajadores[d.turno] : [];
    const asignadosHoy = (d.turno && state.asignacionHoy) ? state.asignacionHoy[d.turno] : [];
    const listaTrab = listaTrabTurno.filter(t => asignadosHoy.includes(t));
    const sinAsignadosEnTurno = d.turno && listaTrab.length === 0;
    const selTrab = el(`<div><label class="field-label">Trabajador evaluado</label><select id="sel-trab" ${!d.turno || sinAsignadosEnTurno?'disabled':''}>
      <option value="">${!d.turno ? 'Seleccione un turno primero' : sinAsignadosEnTurno ? 'Ningún trabajador de este turno fue asignado hoy' : 'Seleccione...'}</option>
      ${listaTrab.map(t=>`<option ${d.trabajador===t?'selected':''}>${t}</option>`).join('')}
    </select></div>`);
    main.appendChild(selTrab);
    selTrab.querySelector('select').onchange = e => { d.trabajador = e.target.value; d.estatus = null; render(); };

    const selZona = el(`<div><label class="field-label">Zona de reposición</label><select id="sel-zona">
      <option value="">Seleccione...</option>
      ${catalogos.zonas.map(z=>`<option ${d.zona===z?'selected':''}>${z}</option>`).join('')}
    </select></div>`);
    main.appendChild(selZona);
    selZona.querySelector('select').onchange = e => { d.zona = e.target.value; };

    if(d.trabajador){
      main.appendChild(el(`<p class="question" style="margin-top:16px;">Estatus del trabajador al momento de la visita</p>`));
      const ESTATUS = [
        {val:'ACTIVO', label:'Activo', icon:'ti-check'},
        {val:'VACACIONES', label:'Vacaciones', icon:'ti-beach'},
        {val:'REPOSO', label:'Reposo', icon:'ti-medical-cross'},
        {val:'DIA_LIBRE', label:'Día libre', icon:'ti-home'}
      ];
      const grid = document.createElement('div');
      grid.style.display = 'grid';
      grid.style.gridTemplateColumns = '1fr 1fr';
      grid.style.gap = '8px';
      grid.style.margin = '8px 0 16px';
      ESTATUS.forEach(o => {
        const active = d.estatus === o.val;
        const btn = el(`<button class="pill ${active?'active':''}" style="${active?'background:var(--blue-pale);border-color:var(--blue-sky);color:var(--blue-mid);':''}"><i class="ti ${o.icon}"></i> ${o.label}</button>`);
        btn.onclick = () => { d.estatus = o.val; render(); };
        grid.appendChild(btn);
      });
      main.appendChild(grid);

      if(d.estatus === 'VACACIONES' || d.estatus === 'REPOSO'){
        main.appendChild(el(`<div class="card warning" style="margin-bottom:16px;"><p style="margin:0;font-size:13px;">El trabajador no está disponible hoy. Se guardará como <strong>Auditoría Justificada</strong> sin checklist de tareas, y esto SÍ cuenta para la cuota semanal de supervisión.</p></div>`));
      } else if(d.estatus === 'DIA_LIBRE'){
        main.appendChild(el(`<div class="card" style="background:var(--blue-pale);margin-bottom:16px;"><p style="margin:0;font-size:13px;color:var(--blue-mid);">Es el día libre del trabajador. Se pospone el checklist para otro día de la semana — este registro <strong>NO cuenta</strong> para la cuota semanal, que seguirá pendiente hasta evaluarlo activo.</p></div>`));
      }
    }

    const esVacacionesReposo = d.estatus === 'VACACIONES' || d.estatus === 'REPOSO';
    const esDiaLibre = d.estatus === 'DIA_LIBRE';
    const esJustificada = esVacacionesReposo || esDiaLibre;
    let labelBtn = 'Comenzar recorrido', iconBtn = 'ti-arrow-right';
    if(esVacacionesReposo){ labelBtn = 'Guardar auditoría justificada'; iconBtn = 'ti-device-floppy'; }
    if(esDiaLibre){ labelBtn = 'Registrar Día Libre - Posponer'; iconBtn = 'ti-calendar-pause'; }
    const nav = el(`<div class="nav-buttons"><button class="btn btn-primary" id="go-next">${labelBtn} <i class="ti ${iconBtn}"></i></button></div>`);
    main.appendChild(nav);
    nav.querySelector('#go-next').onclick = async () => {
      if(!d.turno || !d.evaluador || !d.trabajador || !d.zona){ alert('Complete turno, evaluador, trabajador y zona antes de continuar.'); return; }
      if(!d.estatus){ alert('Seleccione el estatus del trabajador antes de continuar.'); return; }
      if(d.estatus === 'ACTIVO'){ state.screen = 'm1'; state.ciclo = 1; render(); return; }
      d.justificada = esVacacionesReposo;
      d.excluida_cuota = esDiaLibre;
      const btn = nav.querySelector('#go-next');
      btn.disabled = true; btn.textContent = 'Guardando...';
      audits.unshift(d);
      const ok = await persistAudit(d);
      state.draft = null;
      state.tab = 'historial';
      state.justSaved = ok;
      render();
    };
    return;
  }

  if(state.screen === 'm1'){
    const u = d.ubicaciones[state.ciclo-1];
    main.appendChild(el(`<div class="progress-row"><span class="step-title">Auditoría de ubicaciones</span><span class="step-count">Ubicación ${state.ciclo} de 7</span></div>`));

    const dots = el(`<div class="location-dots">${d.ubicaciones.map((x,i)=>{
      const n=i+1, cls = n===state.ciclo ? 'current' : (x.slot&&x.puesto ? 'done':'');
      return `<span class="${cls}">${n}</span>`;
    }).join('')}</div>`);
    main.appendChild(dots);

    main.appendChild(el(`<p style="font-size:13px;color:var(--text-secondary);margin:0 0 12px;">Seleccione de manera aleatoria esta ubicación de despacho y valide.</p>`));

    const scanBtn = el(`<button class="btn btn-scan"><i class="ti ti-camera"></i> ${u.code ? 'Volver a escanear' : 'Escanear código de barras'}</button>`);
    main.appendChild(scanBtn);
    main.appendChild(el(`<input type="text" value="${u.code}" placeholder="Código detectado" disabled style="margin-bottom:16px;">`));
    scanBtn.onclick = async () => {
      const result = await abrirCamara({ modoBarcode: true });
      if(!result) return;
      if(result.code){
        u.code = result.code;
      } else if(result.manual){
        const val = prompt('No se detectó un código automáticamente. Ingréselo manualmente:', u.code || '');
        if(val && val.trim()) u.code = val.trim();
      }
      render();
    };

    main.appendChild(el(`<p class="question">1.1 ¿El producto en el canal corresponde con el slot asignado?</p>`));
    const p1 = el(pillsSVG('p1', u.slot));
    main.appendChild(p1);
    p1.querySelectorAll('.pill').forEach(b => b.onclick = () => { u.slot = b.dataset.val; render(); });

    main.appendChild(el(`<p class="question">1.2 ¿El producto está ubicado en su puesto fijo o cerca del puesto de despacho?</p>`));
    const p2 = el(pillsSVG('p2', u.puesto));
    main.appendChild(p2);
    p2.querySelectorAll('.pill').forEach(b => b.onclick = () => { u.puesto = b.dataset.val; render(); });

    const nav = el(`<div class="nav-buttons">
      <button class="btn" id="go-back"><i class="ti ti-arrow-left"></i> Atrás</button>
      <button class="btn btn-primary" id="go-next">${state.ciclo<7 ? 'Siguiente ubicación' : 'Continuar'} <i class="ti ti-arrow-right"></i></button>
    </div>`);
    main.appendChild(nav);
    nav.querySelector('#go-back').onclick = () => {
      if(state.ciclo>1){ state.ciclo--; } else { state.screen='header'; }
      render();
    };
    nav.querySelector('#go-next').onclick = () => {
      if(!u.slot || !u.puesto){ alert('Responda ambas preguntas antes de continuar.'); return; }
      if(state.ciclo<7){ state.ciclo++; } else { state.screen='m2'; }
      render();
    };
    return;
  }

  if(state.screen === 'm2'){
    main.appendChild(el(`<div class="progress-row"><span class="step-title">Entorno de trabajo</span><span class="step-count">Módulo 3 de 5</span></div>`));
    main.appendChild(el(`<p class="question">2.1 ¿Los bultos en la zona se encuentran identificados con su slot correspondiente?</p>`));
    const p = el(pillsSVG('p', d.bultos_identificados));
    main.appendChild(p);
    p.querySelectorAll('.pill').forEach(b => b.onclick = () => { d.bultos_identificados = b.dataset.val; render(); });

    main.appendChild(el(`<label class="field-label">Aspectos a mejorar (instrucción 1)</label>`));
    const ta = el(`<textarea placeholder="Describa hallazgos del recorrido de ubicaciones...">${d.aspectos_m1}</textarea>`);
    main.appendChild(ta);
    ta.oninput = e => d.aspectos_m1 = e.target.value;

    const nav = el(`<div class="nav-buttons">
      <button class="btn" id="go-back"><i class="ti ti-arrow-left"></i> Atrás</button>
      <button class="btn btn-primary" id="go-next">Continuar <i class="ti ti-arrow-right"></i></button>
    </div>`);
    main.appendChild(nav);
    nav.querySelector('#go-back').onclick = () => { state.screen='m1'; state.ciclo=7; render(); };
    nav.querySelector('#go-next').onclick = () => {
      if(!d.bultos_identificados || !d.aspectos_m1.trim()){ alert('Responda la pregunta y complete el campo de aspectos a mejorar.'); return; }
      state.screen='m3'; render();
    };
    return;
  }

  if(state.screen === 'm3'){
    main.appendChild(el(`<div class="progress-row"><span class="step-title">FEFO, disciplina y paletas</span><span class="step-count">Módulo 4 de 5</span></div>`));

    main.appendChild(el(`<p class="question">3.1 ¿La fecha de vencimiento en despacho es más próxima que en reposición?</p>`));
    const p1 = el(pillsSVG('p1', d.fefo));
    main.appendChild(p1);
    p1.querySelectorAll('.pill').forEach(b => b.onclick = () => { d.fefo = b.dataset.val; render(); });

    const photo1 = el(`<button class="btn btn-photo ${d.foto_fefo?'done':''}"><i class="ti ${d.foto_fefo?'ti-check':'ti-camera'}"></i> ${d.foto_fefo ? 'Foto de fechas adjunta' : 'Tomar foto de fechas de vencimiento'}</button>`);
    main.appendChild(photo1);
    photo1.onclick = async () => {
      const frame = await abrirCamara();
      if(!frame) return;
      photo1.textContent = 'Subiendo foto…';
      const url = window.fbUploadPhoto ? await window.fbUploadPhoto(`fotos/${d.id}/fefo.jpg`, frame.blob) : null;
      d.foto_fefo = true;
      d.foto_fefo_url = url;
      render();
    };

    if(d.fefo){
      const card = el(`<div class="card">
        <p style="margin:0 0 8px;font-size:12px;font-weight:600;color:var(--blue-mid);text-transform:uppercase;letter-spacing:0.03em;">Registro de vencimiento (obligatorio)</p>
        <label class="field-label" style="margin-top:0;">SKU / Producto</label>
        <input type="text" id="venc-sku" value="${d.venc_sku}" placeholder="Ej. SKU8842 - Analgésico X">
        <label class="field-label">Ventana / Ubicación / Pasillo</label>
        <input type="text" id="venc-ubicacion" value="${d.venc_ubicacion}" placeholder="Ej. HA-HM, ventana 12">
        <label class="field-label">Fecha de vencimiento</label>
        <input type="date" id="venc-fecha" value="${d.venc_fecha}">
      </div>`);
      main.appendChild(card);
      card.querySelector('#venc-sku').oninput = e => { d.venc_sku = e.target.value; };
      card.querySelector('#venc-ubicacion').oninput = e => { d.venc_ubicacion = e.target.value; };
      card.querySelector('#venc-fecha').oninput = e => { d.venc_fecha = e.target.value; };
    }

    main.appendChild(el(`<p class="question">3.2 ¿Se cumple con el orden, detalle y limpieza de la zona (5S)?</p>`));
    const p2 = el(pillsSVG('p2', d.cinco_s));
    main.appendChild(p2);
    p2.querySelectorAll('.pill').forEach(b => b.onclick = () => { d.cinco_s = b.dataset.val; render(); });

    const photo2 = el(`<button class="btn btn-photo ${d.foto_5s?'done':''}"><i class="ti ${d.foto_5s?'ti-check':'ti-camera'}"></i> ${d.foto_5s ? 'Foto de la zona adjunta' : 'Tomar foto de la zona'}</button>`);
    main.appendChild(photo2);
    photo2.onclick = async () => {
      const frame = await abrirCamara();
      if(!frame) return;
      photo2.textContent = 'Subiendo foto…';
      const url = window.fbUploadPhoto ? await window.fbUploadPhoto(`fotos/${d.id}/5s.jpg`, frame.blob) : null;
      d.foto_5s = true;
      d.foto_5s_url = url;
      render();
    };

    main.appendChild(el(`<label class="field-label">Aspectos a mejorar del trabajador</label>`));
    const ta = el(`<textarea placeholder="Resumen general de la auditoría...">${d.aspectos_trabajador}</textarea>`);
    main.appendChild(ta);
    ta.oninput = e => d.aspectos_trabajador = e.target.value;

    const nav = el(`<div class="nav-buttons">
      <button class="btn" id="go-back"><i class="ti ti-arrow-left"></i> Atrás</button>
      <button class="btn btn-primary" id="go-next">Continuar <i class="ti ti-arrow-right"></i></button>
    </div>`);
    main.appendChild(nav);
    nav.querySelector('#go-back').onclick = () => { state.screen='m2'; render(); };
    nav.querySelector('#go-next').onclick = () => {
      if(!d.fefo || !d.cinco_s){ alert('Responda las preguntas del módulo antes de continuar.'); return; }
      if(!d.venc_sku.trim() || !d.venc_ubicacion.trim() || !d.venc_fecha){ alert('Complete el registro de vencimiento (SKU, ubicación y fecha) antes de continuar.'); return; }
      state.screen='m4'; render();
    };
    return;
  }

  if(state.screen === 'm4'){
    main.appendChild(el(`<div class="progress-row"><span class="step-title">Cortes, seguridad y bulticos</span><span class="step-count">Módulo 5 de 5</span></div>`));

    main.appendChild(el(`<p class="question">4.1 ¿La caja que contiene las unidades está abierta correctamente?</p>`));
    const p1 = el(pillsSVG('p1', d.cortes_adecuados));
    main.appendChild(p1);
    p1.querySelectorAll('.pill').forEach(b => b.onclick = () => { d.cortes_adecuados = b.dataset.val; render(); });

    main.appendChild(el(`<p class="question">4.2 ¿Las paletas vacías se encuentran limpias, ordenadas y libres de envoplast o cartón?</p>`));
    const card = el(`<div class="card">
      <label class="field-label" style="margin-top:0;">Número de ventanas que incumplen</label>
      <input type="number" min="0" max="${TOTAL_VENTANAS}" id="ventanas-incumplen" value="${d.ventanas_incumplen}">
    </div>`);
    main.appendChild(card);
    card.querySelector('#ventanas-incumplen').oninput = e => { d.ventanas_incumplen = e.target.value; render(); };

    main.appendChild(el(`<p class="question">4.3 ¿El trabajador tiene todos sus implementos de seguridad (guantes anticortes, casco, manga anticortes)?</p>`));
    const p3 = el(pillsSVG('p3', d.equipos_seguridad_ok));
    main.appendChild(p3);
    p3.querySelectorAll('.pill').forEach(b => b.onclick = () => { d.equipos_seguridad_ok = b.dataset.val; render(); });

    main.appendChild(el(`<p class="question">4.4 ¿Hay paletas con bulticos por repositar en la zona evaluada?</p>`));
    const p4 = el(pillsSVG('p4', d.bulticos_pendientes));
    main.appendChild(p4);
    p4.querySelectorAll('.pill').forEach(b => b.onclick = () => { d.bulticos_pendientes = b.dataset.val; render(); });

    const nav2 = el(`<div class="nav-buttons">
      <button class="btn" id="go-back"><i class="ti ti-arrow-left"></i> Atrás</button>
      <button class="btn btn-primary" id="go-finish"><i class="ti ti-device-floppy"></i> Finalizar y guardar</button>
    </div>`);
    main.appendChild(nav2);
    nav2.querySelector('#go-back').onclick = () => { state.screen='m3'; render(); };
    nav2.querySelector('#go-finish').onclick = async () => {
      if(!d.cortes_adecuados || d.ventanas_incumplen==='' || !d.equipos_seguridad_ok || !d.bulticos_pendientes){ alert('Complete las cuatro preguntas del módulo antes de finalizar.'); return; }
      if(Number(d.ventanas_incumplen) > TOTAL_VENTANAS || Number(d.ventanas_incumplen) < 0){ alert('El número de ventanas que incumplen debe estar entre 0 y ' + TOTAL_VENTANAS + '.'); return; }
      const btn = nav2.querySelector('#go-finish');
      btn.disabled = true; btn.textContent = 'Guardando...';
      audits.unshift(d);
      const ok = await persistAudit(d);
      if(d.venc_sku && d.venc_fecha){
        const vReg = {
          id: 'venc_' + d.id.replace('aud_',''),
          sku: d.venc_sku, ubicacion: d.venc_ubicacion, fecha_vencimiento: d.venc_fecha,
          turno: d.turno, trabajador: d.trabajador, zona: d.zona, evaluador: d.evaluador,
          registrado_en: d.fecha_hora,
          resuelto: false, resuelto_accion: null, resuelto_en: null
        };
        await persistVencimiento(vReg);
      }
      state.draft = null;
      state.tab = 'historial';
      state.justSaved = ok;
      render();
    };
    return;
  }
}

loadAll();
</script>
</body>
</html>
